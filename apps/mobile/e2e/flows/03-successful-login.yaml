appId: host.exp.Exponent
---
- runFlow:
    file: ../helpers/reset-to-login.yaml
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 30000
- tapOn:
    id: "login-username"
- eraseText
- inputText: "alice"
- tapOn:
    id: "login-password"
- eraseText
- inputText: "password123"
- tapOn:
    id: "login-submit"
- runFlow:
    when:
      visible: "Agora Não"
    commands:
      - tapOn: "Agora Não"
- runFlow:
    when:
      visible: "Not Now"
    commands:
      - tapOn: "Not Now"
- extendedWaitUntil:
    visible:
      id: "home-balance"
    timeout: 20000
- assertVisible: "Available Balance"
- assertVisible:
    id: "home-balance-amount"
- assertVisible: "Recent Activity"
- assertVisible:
    id: "home-logout"
