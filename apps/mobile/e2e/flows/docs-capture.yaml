appId: host.exp.Exponent
---
- runFlow:
    file: ../helpers/reset-to-login.yaml
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 30000
- takeScreenshot: apps/mobile/e2e/screenshots/01-login-screen
- tapOn:
    id: "login-username"
- eraseText
- inputText: "alice"
- tapOn:
    id: "login-password"
- eraseText
- inputText: "password123"
- tapOn:
    id: "login-submit"
- runFlow:
    when:
      visible: "Agora Não"
    commands:
      - tapOn: "Agora Não"
- extendedWaitUntil:
    visible:
      id: "home-balance"
    timeout: 20000
- takeScreenshot: apps/mobile/e2e/screenshots/02-home-balance-feed
- tapOn: "Send tab"
- extendedWaitUntil:
    visible:
      id: "transfer-search-step"
    timeout: 15000
- takeScreenshot: apps/mobile/e2e/screenshots/03-recipient-search
- tapOn:
    id: "transfer-search"
- eraseText
- inputText: "bob"
- extendedWaitUntil:
    visible:
      id: "recipient-bob"
    timeout: 15000
- tapOn: "Find recipient"
- tapOn:
    id: "recipient-bob"
- extendedWaitUntil:
    visible:
      id: "transfer-amount-step"
    timeout: 15000
- tapOn:
    id: "transfer-amount"
- eraseText
- inputText: "1.00"
- tapOn: "Send Money"
- tapOn:
    id: "transfer-review"
- runFlow:
    when:
      visible:
        id: "transfer-amount-step"
    commands:
      - tapOn: "Review"
- extendedWaitUntil:
    visible:
      id: "transfer-confirm-step"
    timeout: 15000
- takeScreenshot: apps/mobile/e2e/screenshots/04-transfer-confirm
- tapOn:
    id: "transfer-confirm"
- extendedWaitUntil:
    visible:
      id: "transfer-success"
    timeout: 20000
- takeScreenshot: apps/mobile/e2e/screenshots/05-transfer-success
- tapOn:
    id: "transfer-success-done"
- runFlow:
    file: ../helpers/reset-to-login.yaml
- tapOn:
    id: "login-username"
- eraseText
- inputText: "charlie"
- tapOn:
    id: "login-password"
- eraseText
- inputText: "password123"
- tapOn:
    id: "login-submit"
- runFlow:
    when:
      visible: "Agora Não"
    commands:
      - tapOn: "Agora Não"
- extendedWaitUntil:
    visible:
      id: "home-balance"
    timeout: 20000
- tapOn: "Send tab"
- extendedWaitUntil:
    visible:
      id: "transfer-search-step"
    timeout: 15000
- tapOn:
    id: "transfer-search"
- eraseText
- inputText: "alice"
- extendedWaitUntil:
    visible:
      id: "recipient-alice"
    timeout: 15000
- tapOn: "Find recipient"
- tapOn:
    id: "recipient-alice"
- extendedWaitUntil:
    visible:
      id: "transfer-amount-step"
    timeout: 15000
- tapOn:
    id: "transfer-amount"
- eraseText
- inputText: "99999.00"
- tapOn: "Send Money"
- tapOn:
    id: "transfer-review"
- runFlow:
    when:
      visible:
        id: "transfer-amount-step"
    commands:
      - tapOn: "Review"
- extendedWaitUntil:
    visible:
      id: "transfer-confirm-step"
    timeout: 15000
- tapOn:
    id: "transfer-confirm"
- extendedWaitUntil:
    visible:
      id: "transfer-error"
    timeout: 20000
- takeScreenshot: apps/mobile/e2e/screenshots/06-insufficient-funds
