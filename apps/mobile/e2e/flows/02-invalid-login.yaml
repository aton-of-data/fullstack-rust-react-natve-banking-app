appId: host.exp.Exponent
---
- runFlow:
    file: ../helpers/reset-to-login.yaml
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 30000
- tapOn:
    id: "login-username"
- eraseText
- inputText: "notauser"
- tapOn:
    id: "login-password"
- eraseText
- inputText: "wrongpassword"
- tapOn:
    id: "login-submit"
- extendedWaitUntil:
    visible:
      id: "login-error"
    timeout: 20000
- assertVisible:
    id: "login-error"
- assertVisible:
    text: "Invalid username or password.*"
- assertVisible:
    id: "login-screen"
