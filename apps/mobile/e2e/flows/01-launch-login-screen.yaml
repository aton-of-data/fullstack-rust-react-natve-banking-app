appId: host.exp.Exponent
---
- runFlow:
    file: ../helpers/reset-to-login.yaml
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 30000
- assertVisible:
    id: "login-title"
- assertVisible: "Welcome to Ficus"
- assertVisible:
    id: "login-username"
- assertVisible:
    id: "login-password"
- assertVisible:
    id: "login-submit"
- assertVisible: "Sign In"
