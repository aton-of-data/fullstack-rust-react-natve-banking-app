  implementation: .ai/agents/implementation.md
  documenter: .ai/agents/documenter.md
  quality_assurance: .ai/agents/quality-assurance.md
  code_reviewer: .ai/agents/code-reviewer.md
  committer: .ai/agents/committer.md

