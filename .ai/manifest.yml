  feature_planning: .ai/skills/feature-planning.md
  architecture_decision_record: .ai/skills/architecture-decision-record.md
  react_native_redux_toolkit: .ai/skills/react-native-redux-toolkit.md
  rtk_query_api: .ai/skills/rtk-query-api.md
  rust_api_architecture: .ai/skills/rust-api-architecture.md
  jsdoc_and_mermaid: .ai/skills/jsdoc-and-mermaid.md
  conventional_commits: .ai/skills/conventional-commits.md
  testing_and_verification: .ai/skills/testing-and-verification.md
  security_review: .ai/skills/security-review.md
