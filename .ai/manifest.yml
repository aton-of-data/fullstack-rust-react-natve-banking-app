quality_gates:
  frontend:
  - command: npm run typecheck
    required: true
    note: Add when frontend scaffold exists
  - command: npm run lint
    required: true
    note: ESLint + eslint-plugin-jsdoc
  - command: npm run format:check
    required: true
    note: Prettier --check
  - command: npm test
    required: true
  git:
  - command: npx commitlint --edit
    required: true
    note: commit-msg hook; Committer validates message format
  backend:
  - command: cargo fmt --check
  - command: cargo clippy --all-targets --all-features -- -D warnings
  - command: cargo test
  - command: cargo nextest run
    optional: true
  - command: cargo deny check
    optional: true
  - command: cargo audit
    optional: true

prohibited_patterns:
- useState for application state
- useReducer for application state
- createContext / useContext for application state
- fetch or axios in UI layers
- side effects inside reducers
- ORM entities in domain layer
- direct API calls bypassing RTK Query
- exported symbols without JSDoc
- non-conventional commit messages
- TODO test later
- undocumented lint disables
- pipeline bypass for small changes
- prettier/eslint disable without ADR
