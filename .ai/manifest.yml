version: 2
canonical_source: context.md
project:
  name: ficusplatforms
  description: Money transfer and balance tracking app (Venmo-like)
  frontend: react-native
  backend: rust
  package_managers:
  - npm
  - cargo

invariants:
- Every code change requires a tracked work item under docs/ai/work-items/<feature-id>/
- Every work item must move through Architecture → Implementation → Documentation → QA → Code Review → Commit
- A failing gate returns work to the Implementation Agent or Documenter Agent as appropriate
- Reducers must remain pure; side effects are never allowed inside reducers
- No feature is complete without acceptance criteria, tests, JSDoc documentation, verification evidence, and independent review
- The Committer Agent is the only agent allowed to create commits
- The Committer Agent may commit only after all prior gates have passed, Conventional Commits are validated, and authorization exists
- Never bypass the pipeline because a change looks small
- Never introduce a new dependency, framework, abstraction, or architectural pattern without documenting the rationale
- Never claim success without evidence
- Conventional Commits are enforced via commitlint; lint, prettier, and JSDoc are enforced via ESLint

pipeline:
  stages:
  - id: architecture
    agent: architecture
    artifact: docs/ai/work-items/{feature_id}/01-architecture.md
    next: implementation
    blocked_returns_to: null
  - id: implementation
    agent: implementation
    artifact: docs/ai/work-items/{feature_id}/02-implementation.md
    requires: architecture
    next: documentation
    fail_returns_to: architecture
  - id: documentation
    agent: documenter
    artifact: docs/ai/work-items/{feature_id}/03-documentation.md
    requires: implementation
    outcomes:
    - PASS
    - FAIL
    - BLOCKED
    pass_next: quality_assurance
    fail_returns_to: implementation
    doc_only_fail_returns_to: documenter
    blocked_returns_to: architecture
  - id: quality_assurance
    agent: quality-assurance
    artifact: docs/ai/work-items/{feature_id}/04-qa-report.md
    requires: documentation
    outcomes:
    - PASS
    - FAIL
    - BLOCKED
    pass_next: code_review
    fail_returns_to: implementation
    blocked_returns_to: architecture
  - id: code_review
    agent: code-reviewer
    artifact: docs/ai/work-items/{feature_id}/05-code-review.md
    requires: quality_assurance
    outcomes:
    - APPROVED
    - CHANGES_REQUESTED
    - BLOCKED
    pass_next: commit
    fail_returns_to: implementation
    doc_fail_returns_to: documenter
    blocked_returns_to: architecture
  - id: commit
    agent: committer
    artifact: docs/ai/work-items/{feature_id}/06-commit-report.md
    requires: code_review
    exclusive_git_write: true
    requires_conventional_commits: true

