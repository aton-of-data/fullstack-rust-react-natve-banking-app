  delivery_pipeline: .ai/policies/delivery-pipeline.md
  frontend_react_native: .ai/policies/frontend-react-native.md
  frontend_tooling: .ai/policies/frontend-tooling.md
  documentation: .ai/policies/documentation.md
  backend_rust: .ai/policies/backend-rust.md
  quality_and_security: .ai/policies/quality-and-security.md
  git_and_commits: .ai/policies/git-and-commits.md

